<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impel - Lista de pedidos</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/estilo.css">

    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="icon" type="image/png" href="favicon.png">

</head>

<body>

    <!-- ===== Barra de Navegação ===== -->
    <header class="cabecalho">

        <div class="barra-superior">

            <a href="index.html" class="logo">
                <img src="logo.png" alt="IMPEL" id="logo-imagem">
            </a>

            <div class="pesquisa-desktop">
                <input type="text" placeholder="Digite o que você procura">

                <button>
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <button id="botao-tema" class="botao-tema" aria-label="Alternar tema">
                <i class="fa-solid fa-moon"></i>
            </button>

            <a href="lista-pedidos.html" class="botao-lista-topo">

                <i class="fa-solid fa-heart"></i>

                <span class="texto-lista">

                    Minha Lista

                </span>

                <span id="contador-lista" class="contador-lista">

                    0

                </span>

            </a>

            <button class="botao-menu desktop" id="botao-menu-categorias" aria-label="Abrir categorias">
                <i class="fa-solid fa-bars"></i>
            </button>

            <div class="menu-suspenso desktop" id="menu-suspenso-categorias-desktop"></div>
            <div class="menu-suspenso" id="menu-suspenso-categorias-mobile"></div>

        </div>

    </header>

    <header class="cabecalho-categorias">

        <nav class="barra-navegacao">

            <ul class="menu-navegacao" id="menu-navegacao"></ul>


            <div class="mobile">

                <div class="pesquisa-mobile">

                    <button>
                        <i class="fa-solid fa-chevron-down"></i>
                    </button>


                    <input type="text" placeholder="O que você procura?">


                    <button>

                        <i class="fa-solid fa-magnifying-glass"></i>

                    </button>

                </div>


                <button class="botao-menu" id="botao-menu-mobile" aria-label="Abrir categorias">

                    <i class="fa-solid fa-bars"></i>

                </button>

            </div>


        </nav>

    </header>

    <!-- MENU LATERAL MOBILE -->

    <aside class="menu-lateral" id="menu-lateral">

        <ul id="menu-lateral-lista"></ul>

    </aside>


    <div class="fundo-menu" id="fundo-menu"></div>

    <main class="pagina-lista">


        <section class="lista-pedidos-container">


            <div class="titulo-secao">


                <h1>
                    ❤️ Minha Lista de Pedidos
                </h1>


                <p id="texto-lista">

                    Seus produtos selecionados aparecerão aqui.

                </p>


            </div>



            <div id="lista-produtos-pedidos" class="lista-produtos-pedidos">

            </div>

            <section class="resumo-pedido">

                <h2>
                    Resumo do Pedido
                </h2>

                <div class="linha-resumo">
                    <span>Subtotal</span>
                    <strong id="subtotal-pedido">
                        R$ 0,00
                    </strong>
                </div>

                <div class="campo-cupom">

                    <label for="codigo-cupom">

                        Cupom de desconto

                    </label>

                    <div class="grupo-cupom">

                        <input type="text" id="codigo-cupom" placeholder="Digite o cupom">

                        <button id="botao-aplicar-cupom">

                            Aplicar

                        </button>

                    </div>

                </div>


                <div id="cupom-aplicado" class="cupom-aplicado">

                    <span id="texto-cupom">

                        Nenhum cupom aplicado

                    </span>

                    <button id="botao-remover-cupom">

                        Remover

                    </button>

                </div>

                <div class="linha-resumo">

                    <span>

                        Desconto

                    </span>

                    <strong id="desconto-pedido">

                        R$ 0,00

                    </strong>

                </div>

                <div class="linha-resumo">

                    <span>Desconto</span>

                    <strong id="desconto-pedido">

                        R$ 0,00

                    </strong>

                </div>

                <div class="linha-resumo total">

                    <span>Total</span>

                    <strong id="total-pedido">

                        R$ 0,00

                    </strong>


                </div>

                <div class="campo-observacoes">

                    <label for="observacoes-pedido">

                        Observações

                    </label>

                    <textarea id="observacoes-pedido" rows="5"
                        placeholder="Ex.: Gostaria das agendas com o nome personalizado, embalagem para presente, etc.">
                    </textarea>

                </div>

                <button id="botao-enviar-whatsapp" class="botao-whatsapp">

                    <i class="fa-brands fa-whatsapp"></i>

                    Enviar Pedido

                </button>

            </section>

        </section>


    </main>

    <script src="js/config.js"></script>
    <script src="js/tema.js"></script>
    <script src="js/script.js"></script>
    <script src="js/lista-pedidos.js"></script>
    <script src="js/cupons.js"></script>
    <script src="js/pagina-lista.js"></script>
</body>
